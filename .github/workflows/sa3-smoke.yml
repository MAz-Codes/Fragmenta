name: SA3 smoke

# CPU smoke suite for the SA3 backend. The contract + pre-encode tests run on
# every push/PR; the model-gated generation/training tests self-skip when no
# checkpoint is present (they need gated HF downloads), so CI stays green and
# fast without shipping multi-GB weights into the runner.

on:
  push:
    branches: [main, dev/sa3]
  pull_request:
    branches: [main, dev/sa3]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip "setuptools<70" wheel
          # CPU torch first (matches docker/Dockerfile.cpu) so we don't pull the
          # multi-GB CUDA wheel onto the runner.
          pip install torch==2.7.1 torchvision==0.22.1 torchaudio==2.7.1 \
            --index-url https://download.pytorch.org/whl/cpu
          # Strip from requirements.txt, same as the CPU Docker image:
          #   - the CUDA (cu128) extra-index-url (torch already installed above)
          #   - flash-attn (Linux+CUDA only; the smoke tests don't need it)
          #   - pycairo / pygobject / pywebview (desktop GUI deps — they build
          #     from source and need libcairo/GI; the backend import chain and
          #     the smoke tests never touch them, only start.py's window does)
          grep -ivE 'flash-attn|extra-index-url|pycairo|pygobject|pywebview' \
            requirements.txt > requirements-ci.txt
          pip install -r requirements-ci.txt --prefer-binary

      - name: Contract smoke (offline)
        env:
          PYTHONPATH: vendor/stable-audio-3
          FRAGMENTA_FORCE_DEVICE: cpu
        run: python tests/smoke_test_sa3_contract.py

      - name: Pre-encode wiring smoke (offline)
        env:
          PYTHONPATH: vendor/stable-audio-3
        run: python tests/smoke_test_pre_encode.py

      - name: Generation smoke (skips without a downloaded model)
        env:
          PYTHONPATH: vendor/stable-audio-3
          FRAGMENTA_FORCE_DEVICE: cpu
        run: python tests/smoke_test_sa3.py
